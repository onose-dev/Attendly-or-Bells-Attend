<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/Student-Profile</title>
    <link rel="stylesheet" href="../Shared/attendly-tokens.css">
</head>
<body>
    <h1>Student Profile</h1>
    <div class="studentProfile">
        <div class="profilePicture">
            <!-- This will be the profile picture of the student, which they can upload and change -->
        </div>
        <div class="profileDetails">
            <div class="profileDetail"><label for="fullName">Full Name:</label><input type="text" id="fullName" name="fullName"></div>
            <div class="profileDetail"><label for="matricNo">Matric No:</label><input type="text" id="matricNo" name="matricNo"></div>
            <div class="profileDetail"><label for="level">Level:</label><input type="text" id="level" name="level"></div>
            <div class="profileDetail"><label for="college">College:</label><input type="text" id="college" name="college"></div>
            <div class="profileDetail"><label for="department">Department:</label><input type="text" id="department" name="department"></div>
        </div>

        <p>Records are locked by the administration., to update please contact the administration.</p>
        <a href="contact-admin.html">Contact Administration</a>
</body>
</html>
